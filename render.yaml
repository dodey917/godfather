services:
  - type: worker
    name: telegram-subscriber-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: NOTIFICATION_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL
        value: 30
